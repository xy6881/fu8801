    <script defer src="https://unpkg.com/tailwindcss-intersect@2.x.x/dist/observer.min.js"></script>
    <script type="module">
        // 留言板動畫優化與防呆
        const imgbox = document.querySelector(".imgbox");
        const allimg = document.querySelector(".allimg");
        
        // 只有在元素存在時才執行，避免報錯癱瘓頁面
        if (imgbox && allimg) {
            let divClone = imgbox.cloneNode(true);
            allimg.appendChild(divClone);
            let time = 0;

            function move() {
                if (time <= imgbox.clientHeight) {
                    if (time === -imgbox.clientHeight) {
                        time = 0;
                    }
                    allimg.style.transform = `translateY(${time}px)`;
                    time -= 0.5;
                }
                requestAnimationFrame(move);
            }
            requestAnimationFrame(move);
        }
    </script>
